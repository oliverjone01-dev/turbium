name: Publish site to gh-pages
on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/pages.yml']
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (locked version only)
        run: |
          mkdir -p _site
          cp site/turbium-locked.html _site/index.html
          touch _site/.nojekyll
      - name: Push to gh-pages
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "turbium-ci"
          git config user.email "ci@turbium.local"
          git add -A
          git commit -m "deploy: $GITHUB_SHA"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
